<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopBot — AI Assistant for Nova Store</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1f1f1f;
    --border: #2a2a2a;
    --accent: #c8f04e;
    --accent-dim: rgba(200,240,78,0.12);
    --text: #f0f0f0;
    --muted: #888;
    --bot-bg: #1f1f1f;
    --user-bg: #c8f04e;
    --user-text: #0d0d0d;
    --radius: 18px;
    --radius-sm: 10px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  .wrapper {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  /* Store header */
  .store-header {
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: var(--radius) var(--radius) 0 0;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .store-name {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: var(--accent);
    letter-spacing: 0.5px;
  }

  .store-tag {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    font-weight: 300;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Chat window */
  .chat-window {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 1px solid #222;
    border-bottom: none;
    height: 420px;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }

  .chat-window::-webkit-scrollbar { width: 4px; }
  .chat-window::-webkit-scrollbar-track { background: transparent; }
  .chat-window::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* Messages */
  .msg { display: flex; gap: 10px; align-items: flex-end; animation: fadeUp 0.3s ease; }
  .msg.user { flex-direction: row-reverse; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--accent-dim);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
  }

  .bubble {
    max-width: 78%;
    padding: 11px 15px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.55;
  }

  .msg.bot .bubble {
    background: var(--bot-bg);
    color: var(--text);
    border-bottom-left-radius: 4px;
    border: 1px solid var(--border);
  }

  .msg.user .bubble {
    background: var(--user-bg);
    color: var(--user-text);
    border-bottom-right-radius: 4px;
    font-weight: 500;
  }

  /* Typing indicator */
  .typing { display: flex; gap: 5px; align-items: center; padding: 13px 16px; }
  .typing span {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--muted);
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* Quick questions */
  .quick-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 1px solid #222;
    border-bottom: none;
    padding: 12px 16px 8px;
  }

  .quick-label { font-size: 11px; color: var(--muted); margin-bottom: 8px; letter-spacing: 0.5px; }

  .quick-pills {
    display: flex; flex-wrap: wrap; gap: 7px;
  }

  .pill {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 6px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 99px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .pill:hover {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Input area */
  .input-area {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 1px solid #222;
    border-radius: 0 0 var(--radius) var(--radius);
    padding: 14px 16px;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .chat-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 10px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  .chat-input::placeholder { color: var(--muted); }
  .chat-input:focus { border-color: var(--accent); }

  .send-btn {
    width: 40px; height: 40px;
    background: var(--accent);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s, opacity 0.15s;
    flex-shrink: 0;
  }

  .send-btn:hover { transform: scale(1.07); }
  .send-btn:active { transform: scale(0.95); }

  .send-btn svg { width: 17px; height: 17px; fill: #0d0d0d; }

  /* Powered by */
  .powered {
    text-align: center;
    font-size: 11px;
    color: #444;
    margin-top: 14px;
  }

  .powered span { color: var(--accent); font-weight: 500; }
</style>
</head>
<body>

<div class="wrapper">
  <div class="store-header">
    <div>
      <div class="store-name">Nova Store</div>
      <div class="store-tag">Premium Fashion & Lifestyle</div>
    </div>
    <div class="status-dot"></div>
  </div>

  <div class="chat-window" id="chatWindow">
    <div class="msg bot">
      <div class="avatar">🛍️</div>
      <div class="bubble">Hi! I'm Nova's AI assistant. I can help you with orders, shipping, returns, products, and anything else. What do you need? 😊</div>
    </div>
  </div>

  <div class="quick-section">
    <div class="quick-label">QUICK QUESTIONS</div>
    <div class="quick-pills">
      <button class="pill" onclick="askQuestion('Where is my order?')">📦 Where is my order?</button>
      <button class="pill" onclick="askQuestion('What is your return policy?')">↩️ Returns policy</button>
      <button class="pill" onclick="askQuestion('How long does shipping take?')">🚚 Shipping time</button>
      <button class="pill" onclick="askQuestion('Do you ship internationally?')">🌍 International shipping</button>
      <button class="pill" onclick="askQuestion('How do I cancel my order?')">❌ Cancel order</button>
      <button class="pill" onclick="askQuestion('What payment methods do you accept?')">💳 Payment methods</button>
    </div>
  </div>

  <div class="input-area">
    <input class="chat-input" id="chatInput" type="text" placeholder="Ask anything about your order…" onkeydown="if(event.key==='Enter') sendMessage()" />
    <button class="send-btn" onclick="sendMessage()" aria-label="Send">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M2 21L23 12 2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>
</div>

<div class="powered">Powered by <span>ShopBot AI</span> — built by Nabiha Samihat</div>

<script>
const faqs = {
  "where is my order": "I can look that up for you! Please share your order number (e.g. #NS1234) and I'll check the status right away. Orders typically ship within 1–2 business days. 📦",
  "return policy": "Nova Store offers a **30-day hassle-free return policy**. Items must be unused and in original packaging. To start a return, just email returns@novastore.com with your order number. Refunds are processed within 5–7 business days. ✅",
  "what is your return policy": "Nova Store offers a **30-day hassle-free return policy**. Items must be unused and in original packaging. To start a return, just email returns@novastore.com with your order number. Refunds are processed within 5–7 business days. ✅",
  "shipping time": "Standard shipping takes **3–5 business days** within the US. Express shipping (1–2 days) is available at checkout for $9.99. Orders placed before 2pm EST ship the same day! 🚚",
  "how long does shipping take": "Standard shipping takes **3–5 business days** within the US. Express shipping (1–2 days) is available at checkout for $9.99. Orders placed before 2pm EST ship the same day! 🚚",
  "international shipping": "Yes! We ship to 40+ countries worldwide. 🌍 International shipping takes 7–14 business days and costs $14.99 flat. Free international shipping on orders over $150!",
  "do you ship internationally": "Yes! We ship to 40+ countries worldwide. 🌍 International shipping takes 7–14 business days and costs $14.99 flat. Free international shipping on orders over $150!",
  "cancel order": "Orders can be cancelled within **2 hours of placing them**. After that, they've usually entered processing. To cancel, email support@novastore.com immediately with your order number and we'll do our best! ❌",
  "how do i cancel my order": "Orders can be cancelled within **2 hours of placing them**. After that, they've usually entered processing. To cancel, email support@novastore.com immediately with your order number and we'll do our best! ❌",
  "payment methods": "We accept Visa, Mastercard, American Express, PayPal, Apple Pay, and Google Pay. All transactions are secured with 256-bit SSL encryption. 💳",
  "what payment methods do you accept": "We accept Visa, Mastercard, American Express, PayPal, Apple Pay, and Google Pay. All transactions are secured with 256-bit SSL encryption. 💳",
  "discount": "Use code **NOVA10** for 10% off your first order! We also run seasonal sales — follow us on Instagram @NovaStore for exclusive deals. 🎉",
  "promo code": "Use code **NOVA10** for 10% off your first order! We also run seasonal sales — follow us on Instagram @NovaStore for exclusive deals. 🎉",
  "size guide": "Our size guide is available on every product page — click 'Size Guide' under the product photos. Generally we follow standard US sizing. If you're between sizes, we recommend sizing up. 📏",
  "sizes": "Our size guide is available on every product page — click 'Size Guide' under the product photos. Generally we follow standard US sizing. If you're between sizes, we recommend sizing up. 📏",
  "contact": "You can reach our team at support@novastore.com or via live chat Mon–Fri 9am–6pm EST. We reply within 24 hours. 📧",
  "track": "To track your order, visit novastore.com/track and enter your order number and email. You'll also receive tracking emails automatically once your order ships! 🔍",
};

function getReply(msg) {
  const lower = msg.toLowerCase().trim();
  for (const [key, val] of Object.entries(faqs)) {
    if (lower.includes(key)) return val;
  }
  return "Great question! I don't have that specific info right away, but our support team can help you out. Email us at support@novastore.com or try one of the quick questions below. 😊";
}

function appendMsg(text, role) {
  const win = document.getElementById('chatWindow');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const avatar = role === 'bot' ? '<div class="avatar">🛍️</div>' : '';
  div.innerHTML = `${role === 'bot' ? avatar : ''}<div class="bubble">${text}</div>${role === 'user' ? '<div class="avatar" style="background:rgba(200,240,78,0.15);border-color:#c8f04e;">👤</div>' : ''}`;
  win.appendChild(div);
  win.scrollTop = win.scrollHeight;
}

function showTyping() {
  const win = document.getElementById('chatWindow');
  const div = document.createElement('div');
  div.className = 'msg bot'; div.id = 'typingMsg';
  div.innerHTML = '<div class="avatar">🛍️</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  win.appendChild(div);
  win.scrollTop = win.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typingMsg');
  if (t) t.remove();
}

function sendMessage() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  appendMsg(msg, 'user');
  showTyping();
  setTimeout(() => {
    removeTyping();
    appendMsg(getReply(msg), 'bot');
  }, 900 + Math.random() * 600);
}

function askQuestion(q) {
  document.getElementById('chatInput').value = q;
  sendMessage();
}
</script>
</body>
</html>
